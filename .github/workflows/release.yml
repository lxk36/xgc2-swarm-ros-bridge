name: release

on:
  workflow_dispatch:
    inputs:
      expected_version:
        description: Product version expected by the release orchestrator
        required: true
        type: string
      expected_source_sha:
        description: Source commit SHA expected by the release orchestrator
        required: true
        type: string
      publish_apt:
        description: Publish built debs to the XGC2 APT repository
        required: true
        default: false
        type: boolean
      run_cpp_quality:
        description: Run optional C++ quality checks before release
        required: true
        default: false
        type: boolean
      run_source_tests:
        description: Run optional source tests before release
        required: true
        default: false
        type: boolean

defaults:
  run:
    shell: bash

jobs:
  validate-release-inputs:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.product.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate expected version and source SHA
        id: product
        run: |
          set -euo pipefail
          version="$(awk -F': *' '/^version:[[:space:]]*/ {print $2; exit}' .xgc2/product.yml)"
          test -n "${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          test "${version}" = "${{ inputs.expected_version }}"
          test "$(git rev-parse HEAD)" = "${{ inputs.expected_source_sha }}"

  build-debs:
    needs: validate-release-inputs
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Build and install-check deb package
        run: |
          if [[ "${{ inputs.run_cpp_quality }}" == "true" || "${{ inputs.run_source_tests }}" == "true" ]]; then
            echo "No standalone quality/source test switch is currently exposed; running package build and install checks." >&2
          fi
          .xgc2/scripts/build_debs_in_docker.sh \
            --work-dir "$RUNNER_TEMP/xgc2-swarm-ros-bridge-release-${{ matrix.arch }}" \
            --output-dir "$GITHUB_WORKSPACE/debs"

      - name: Upload deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xgc2-swarm-ros-bridge-release-debs-${{ matrix.arch }}
          path: debs/*.deb

  publish-apt:
    if: ${{ inputs.publish_apt }}
    needs: build-debs
    runs-on: ubuntu-latest
    env:
      APT_REPO_HOST: ${{ secrets.APT_REPO_HOST }}
      APT_REPO_PORT: ${{ secrets.APT_REPO_PORT }}
      APT_REPO_SSH_KEY: ${{ secrets.APT_REPO_SSH_KEY }}
      APT_REPO_KNOWN_HOSTS: ${{ secrets.APT_REPO_KNOWN_HOSTS }}
    steps:
      - uses: actions/checkout@v4

      - name: Download deb artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: xgc2-swarm-ros-bridge-release-debs-*
          path: debs
          merge-multiple: true

      - name: Publish to self-hosted APT repository
        run: |
          set -euo pipefail
          test -n "${APT_REPO_HOST}"
          test -n "${APT_REPO_SSH_KEY}"
          test -n "${APT_REPO_KNOWN_HOSTS}"
          export APT_REPO_PORT="${APT_REPO_PORT:-22}"
          .xgc2/scripts/publish_apt_repo.sh --deb-dir debs
